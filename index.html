<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LibreSpice</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>LibreSpice</h1>
      <p class="subtitle">A lightweight LTSpice-like web playground for simple DC operating-point analysis.</p>

      <label for="netlist">SPICE netlist</label>
      <textarea id="netlist" spellcheck="false">* Simple divider example
V1 in 0 10
R1 in out 1k
R2 out 0 1k
.op</textarea>

      <button id="simulate" type="button">Run .op</button>

      <section>
        <h2>Results</h2>
        <pre id="result">Ready.</pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
